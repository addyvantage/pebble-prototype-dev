AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Pebble multi-language runner (Lambda container)

Globals:
  Function:
    MemorySize: 1024
    Timeout: 15
    Tracing: Active

Resources:
  PebbleRunnerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      FunctionName: pebble-multilang-runner
      FunctionUrlConfig:
        AuthType: AWS_IAM
        InvokeMode: BUFFERED
    Metadata:
      DockerContext: ./
      Dockerfile: Dockerfile
      DockerTag: latest

Outputs:
  RunnerFunctionName:
    Description: Lambda function name for /api/run invoke proxy
    Value: !Ref PebbleRunnerFunction
  RunnerFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt PebbleRunnerFunction.Arn
  RunnerFunctionUrl:
    Description: IAM-protected Function URL
    Value: !GetAtt PebbleRunnerFunctionUrl.FunctionUrl
